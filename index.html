<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lo del Doro</title>
  <meta name="description" content="Pastas caseras hechas en el día. Pedí por WhatsApp.">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #dff4ff, #eef9ff);
      color: #1f3b57;
    }

    .contenedor {
      max-width: 520px;
      margin: 0 auto;
    }

    .logo {
      width: 85px;
      display: block;
      margin: 0 auto 12px auto;
      border-radius: 16px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .titulo {
      text-align: center;
      font-size: 34px;
      margin-bottom: 8px;
      color: #0f4c81;
    }

    .subtitulo {
      text-align: center;
      font-size: 18px;
      color: #4b6f8f;
      margin-top: 0;
      margin-bottom: 12px;
    }

    .fecha-aviso {
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #0f4c81;
      background: #ffffff;
      border: 1px solid #d5ebf8;
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 12px rgba(74, 131, 177, 0.10);
    }

    .mini-imagen {
      width: 100%;
      max-width: 170px;
      border-radius: 14px;
      display: block;
      margin: 10px auto 14px auto;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .descripcion {
      text-align: center;
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 20px;
      color: #365977;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 6px 16px rgba(74, 131, 177, 0.12);
      border: 1px solid #d5ebf8;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #0f4c81;
      font-size: 22px;
    }

    .producto {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .producto strong {
      color: #1570b8;
    }

    .aclaracion {
      font-size: 14px;
      color: #4b6f8f;
      margin-top: -4px;
      margin-bottom: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #b7d8ec;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: #fafdff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #66aee0;
      box-shadow: 0 0 0 3px rgba(102, 174, 224, 0.18);
    }

    .oculto {
      display: none;
    }

    .total {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #0f4c81;
      margin: 10px 0 20px 0;
    }

    .boton {
      width: 100%;
      padding: 16px;
      background: #1d77c3;
      color: white;
      font-size: 19px;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(29, 119, 195, 0.25);
      transition: 0.2s ease;
    }

    .boton:hover {
      background: #0e63aa;
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #4f7393;
      font-size: 15px;
    }

    @media (min-width: 768px) {
      .logo {
        width: 100px;
      }

      .mini-imagen {
        max-width: 190px;
      }
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <img src="logo.jpg" class="logo" alt="Logo Lo del Doro">

    <h2 class="titulo">🍝 Lo del Doro</h2>
    <p class="subtitulo">Pastas caseras hechas en el día</p>

    <div class="fecha-aviso">Se harán el sábado 11</div>

    <p class="descripcion">
      Hechas a mano, frescas y listas para tu mesa.
    </p>

    <div class="card">
      <h3>Porción de sorrentinos (12 unidades)</h3>
      
      <div class="producto">
        <span>Ricota y espinaca</span>
        <strong>$12.000</strong>
      </div>

      <img src="sorrentinos de espinaca 2.jpg" class="mini-imagen" alt="Sorrentinos de ricota y espinaca">

      <input type="number" id="s1" value="0" min="0" max="50">

      <div class="producto">
        <span>Pollo</span>
        <strong>$12.000</strong>
      </div>

      <img src="photo.jpg" class="mini-imagen" alt="Sorrentinos de pollo">

      <input type="number" id="s2" value="0" min="0" max="50">
    </div>

    <div class="card">
      <h3>Entrega</h3>

      <select id="envio">
        <option value="Retiro">Retiro</option>
        <option value="Envio">Envío (+$3.000)</option>
      </select>

      <div id="campoDireccion" class="oculto">
        <input type="text" id="direccion" placeholder="Escribí tu dirección">
      </div>
    </div>

    <div class="total" id="total">Total: $0</div>

    <button onclick="enviarPedido()" class="boton">
      Hacer pedido por WhatsApp
    </button>

    <footer class="footer">
      🍝 <strong>Lo del Doro</strong><br>
      <span>Pastas Caseras</span>
    </footer>
  </div>

  <script>
    const MI_WHATSAPP = "5492966630708";
    const URL_N8N = "https://mateoespeche.app.n8n.cloud/webhook/pedido-doro";

    function calcularTotal(inputCambiado = null) {
      let s1 = parseInt(document.getElementById("s1").value) || 0;
      let s2 = parseInt(document.getElementById("s2").value) || 0;
      const envio = document.getElementById("envio").value;

      const totalPorciones = s1 + s2;

      if (totalPorciones > 50) {
        alert("Solo se pueden pedir hasta 50 porciones en total.");

        if (inputCambiado === "s1") {
          s1 = 50 - s2;
          if (s1 < 0) s1 = 0;
          document.getElementById("s1").value = s1;
        }

        if (inputCambiado === "s2") {
          s2 = 50 - s1;
          if (s2 < 0) s2 = 0;
          document.getElementById("s2").value = s2;
        }
      }

      let total = (s1 * 11000) + (s2 * 12000);

      if (envio === "Envio") {
        total += 3000;
      }

      document.getElementById("total").innerText = `Total: $${total.toLocaleString("es-AR")}`;
    }

    function actualizarEntrega() {
      const envio = document.getElementById("envio").value;
      const campoDireccion = document.getElementById("campoDireccion");

      if (envio === "Envio") {
        campoDireccion.classList.remove("oculto");
      } else {
        campoDireccion.classList.add("oculto");
      }

      calcularTotal();
    }

    function enviarPedido() {
      const s1 = parseInt(document.getElementById("s1").value) || 0;
      const s2 = parseInt(document.getElementById("s2").value) || 0;
      const envio = document.getElementById("envio").value;
      const direccion = document.getElementById("direccion").value.trim();

      if (s1 === 0 && s2 === 0) {
        alert("Por favor elegí al menos un producto");
        return;
      }

      if ((s1 + s2) > 50) {
        alert("Solo se pueden pedir hasta 50 porciones en total.");
        return;
      }

      if (envio === "Envio" && direccion === "") {
        alert("Por favor escribí tu dirección");
        return;
      }

      let total = (s1 * 11000) + (s2 * 12000);

      if (envio === "Envio") {
        total += 3000;
      }

      const datosPedido = {
        fecha: new Date().toLocaleString("es-AR"),
        ricota_espinaca: s1,
        pollo: s2,
        total_porciones: s1 + s2,
        entrega: envio,
        direccion: envio === "Envio" ? direccion : "Retiro en el local",
        total: total
      };

      let mensaje = "Hola! Quiero hacer este pedido:%0A%0A";

      if (s1 > 0) mensaje += `- ${s1} x Porción de sorrentinos (12 unidades) de ricota y espinaca%0A`;
      if (s2 > 0) mensaje += `- ${s2} x Porción de sorrentinos (12 unidades) de pollo%0A`;

      mensaje += `%0APorciones totales: ${s1 + s2}%0A`;
      mensaje += `Entrega: ${envio}%0A`;

      if (envio === "Envio") {
        mensaje += `Dirección: ${encodeURIComponent(direccion)}%0A`;
      }

      mensaje += `%0ATotal: $${total.toLocaleString("es-AR")}`;

      fetch(URL_N8N, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(datosPedido)
      }).catch(error => {
        console.error("Error enviando a n8n:", error);
      });

      window.location.href = `https://wa.me/${MI_WHATSAPP}?text=${mensaje}`;
    }

    document.getElementById("s1").addEventListener("input", function () {
      calcularTotal("s1");
    });

    document.getElementById("s2").addEventListener("input", function () {
      calcularTotal("s2");
    });

    document.getElementById("envio").addEventListener("change", actualizarEntrega);

    calcularTotal();
  </script>
</body>
</html>
