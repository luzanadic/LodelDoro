<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lo del Doro</title>
  <meta name="description" content="Pastas caseras hechas en el día. Pedí por WhatsApp.">
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #dff4ff, #eef9ff);
      color: #1f3b57;
    }

    .contenedor {
      max-width: 520px;
      margin: 0 auto;
    }

    .logo {
      width: 120px;
      display: block;
      margin: 0 auto 12px auto;
      border-radius: 16px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .titulo {
      text-align: center;
      font-size: 34px;
      margin-bottom: 8px;
      color: #0f4c81;
    }

    .subtitulo {
      text-align: center;
      font-size: 18px;
      color: #4b6f8f;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .mini-imagen {
      width: 100%;
      max-width: 220px;
      border-radius: 14px;
      display: block;
      margin: 10px 0 14px 0;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .descripcion {
      text-align: center;
      font-size: 17px;
      line-height: 1.5;
      margin-bottom: 20px;
      color: #365977;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 18px;
      box-shadow: 0 6px 16px rgba(74, 131, 177, 0.12);
      border: 1px solid #d5ebf8;
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #0f4c81;
      font-size: 22px;
    }

    .producto {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .producto strong {
      color: #1570b8;
    }

    input,
    select {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #b7d8ec;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: #fafdff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #66aee0;
      box-shadow: 0 0 0 3px rgba(102, 174, 224, 0.18);
    }

    .oculto {
      display: none;
    }

    .total {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #0f4c81;
      margin: 10px 0 20px 0;
    }

    .boton {
      width: 100%;
      padding: 16px;
      background: #1d77c3;
      color: white;
      font-size: 19px;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(29, 119, 195, 0.25);
      transition: 0.2s ease;
    }

    .boton:hover {
      background: #0e63aa;
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      color: #4f7393;
      font-size: 15px;
    }
  </style>
</head>
<body>
    <img src="logo.jpg" class="logo.jpg" alt="logo.jpg">

    <h2 class="titulo">🍝 Lo del Doro</h2>
    <p class="subtitulo">Pastas caseras hechas en el día</p>

    <p class="descripcion">
      Hechas a mano, frescas y listas para tu mesa.
    </p>

    <div class="card">
      <h3>Sorrentinos</h3>

      <div class="producto">
        <span>Ricota y espinaca </span>
        <strong>$11.000</strong>
      </div>

      <img src="sorrentinos de espinaca 2.jpg"  alt="Sorrentinos de espinaca 2">

      <input type="number" id="s1" value="0" min="0">

      <div class="producto">
        <span>Pollo</span>
        <strong>$12.000</strong>
      </div>

      <img src="photo.jpg"  alt="photo">

      <input type="number" id="s2" value="0" min="0">
    </div>

    <div class="card">
      <h3>Fideos</h3>

      <div class="producto">
        <span>Fideos caseros</span>
        <strong>$8.000</strong>
      </div>
      <input type="number" id="f1" value="0" min="0">
    </div>

    <div class="card">
      <h3>Entrega</h3>

      <select id="envio">
        <option value="Retiro">Retiro</option>
        <option value="Envio">Envío (+$3.000)</option>
      </select>

      <div id="campoDireccion" class="oculto">
        <input type="text" id="direccion" placeholder="Escribí tu dirección">
      </div>
    </div>

    <div class="total" id="total">Total: $0</div>

    <button onclick="enviarPedido()" class="boton">
      Hacer pedido por WhatsApp
    </button>

    <footer class="footer">
      🍝 <strong>Lo del Doro</strong><br>
      <span>Pastas Caseras</span>
    </footer>
  </div>

  <script>
    const MI_WHATSAPP = "5492966630708";

    function calcularTotal() {
      const s1 = parseInt(document.getElementById("s1").value) || 0;
      const s2 = parseInt(document.getElementById("s2").value) || 0;
      const f1 = parseInt(document.getElementById("f1").value) || 0;
      const envio = document.getElementById("envio").value;

      let total = (s1 * 11000) + (s2 * 12000) + (f1 * 8000);

      if (envio === "Envio") {
        total += 3000;
      }

      document.getElementById("total").innerText = `Total: $${total.toLocaleString("es-AR")}`;
    }
